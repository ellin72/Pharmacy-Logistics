<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics &amp; Reports — Ehafo Clinic Pharmacy</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .kpi-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
    }
    .kpi-label { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    .kpi-value { font-size: 2.25rem; font-weight: 700; line-height: 1.1; margin: 0.25rem 0; }
    .kpi-sub   { font-size: 0.8rem; color: var(--text-secondary); }

    .report-section { margin-bottom: 2rem; }
    .report-table-wrapper { overflow-x: auto; }
    .report-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .report-table th, .report-table td { padding: 0.6rem 0.875rem; border-bottom: 1px solid var(--border-color); text-align: left; }
    .report-table th { background: var(--bg-secondary); font-weight: 600; color: var(--text-secondary); }
    .report-table tbody tr:hover { background: var(--bg-secondary); }

    .chip { display:inline-block; padding:0.2rem 0.5rem; border-radius:99px; font-size:0.75rem; font-weight:600; }
    .chip-red    { background:#fee2e2; color:#991b1b; }
    .chip-yellow { background:#fef3c7; color:#92400e; }
    .chip-green  { background:#d1fae5; color:#065f46; }
    .chip-blue   { background:#dbeafe; color:#1e40af; }

    .date-range { display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end; margin-bottom:1.25rem; }
    .date-range label { font-size:0.875rem; font-weight:500; }
    .date-range input[type="date"] { padding:0.4rem 0.6rem; border:1px solid var(--border-color); border-radius:0.375rem; font-size:0.875rem; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div class="header">
    <div class="header-content">
      <div class="logo">🏥 Ehafo Clinic Pharmacy</div>
      <div class="user-menu">
        <span class="user-info" id="userEmail"></span>
        <a href="dashboard.html" class="btn btn-secondary btn-sm">← Dashboard</a>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Log Out</button>
      </div>
    </div>
  </div>

  <div class="container" id="main-content">
    <div class="dashboard-header" style="margin-bottom:1.5rem;">
      <h1 class="dashboard-title">📊 Analytics &amp; Reports</h1>
      <p style="color:var(--text-secondary);margin-top:0.25rem;">
        Real-time inventory health, consumption trends, and actionable summaries.
      </p>
    </div>

    <!-- KPI Cards -->
    <div class="analytics-grid" id="kpiGrid">
      <div class="kpi-card skeleton-card">
        <div class="skeleton skeleton-text short" style="margin-bottom:0.5rem;"></div>
        <div class="skeleton skeleton-text wide" style="height:2.25rem;margin-bottom:0.25rem;"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
      <div class="kpi-card skeleton-card">
        <div class="skeleton skeleton-text short" style="margin-bottom:0.5rem;"></div>
        <div class="skeleton skeleton-text wide" style="height:2.25rem;margin-bottom:0.25rem;"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
      <div class="kpi-card skeleton-card">
        <div class="skeleton skeleton-text short" style="margin-bottom:0.5rem;"></div>
        <div class="skeleton skeleton-text wide" style="height:2.25rem;margin-bottom:0.25rem;"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
      <div class="kpi-card skeleton-card">
        <div class="skeleton skeleton-text short" style="margin-bottom:0.5rem;"></div>
        <div class="skeleton skeleton-text wide" style="height:2.25rem;margin-bottom:0.25rem;"></div>
        <div class="skeleton skeleton-text short"></div>
      </div>
    </div>

    <!-- Section tabs -->
    <div style="display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" onclick="showSection('expiring')" id="tab-expiring">⏰ Expiring Soon</button>
      <button class="btn btn-secondary btn-sm" onclick="showSection('lowstock')" id="tab-lowstock">📉 Low Stock</button>
      <button class="btn btn-secondary btn-sm" onclick="showSection('consumption')" id="tab-consumption">📦 Consumption (30d)</button>
      <button class="btn btn-secondary btn-sm" onclick="showSection('dispense')" id="tab-dispense">💊 Dispense Log</button>
    </div>

    <!-- Expiring Soon section -->
    <div id="section-expiring" class="card report-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
        <h2 style="font-size:1.1rem;font-weight:700;margin:0;">⏰ Medicines Expiring Within 90 Days</h2>
        <button class="btn btn-secondary btn-sm" onclick="exportSection('expiring')">📥 Export</button>
      </div>
      <div id="expiringContent"></div>
    </div>

    <!-- Low Stock section -->
    <div id="section-lowstock" class="card report-section hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
        <h2 style="font-size:1.1rem;font-weight:700;margin:0;">📉 Low Stock &amp; Out-of-Stock Items</h2>
        <button class="btn btn-secondary btn-sm" onclick="exportSection('lowstock')">📥 Export</button>
      </div>
      <div id="lowstockContent"></div>
    </div>

    <!-- Consumption section -->
    <div id="section-consumption" class="card report-section hidden">
      <div style="margin-bottom:1rem;">
        <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:0.75rem;">📦 Stock Consumption — Last 30 Days</h2>
        <div class="date-range">
          <div>
            <label for="consumeFrom">From</label><br>
            <input type="date" id="consumeFrom" onchange="loadConsumption()" />
          </div>
          <div>
            <label for="consumeTo">To</label><br>
            <input type="date" id="consumeTo" onchange="loadConsumption()" />
          </div>
          <button class="btn btn-secondary btn-sm" onclick="exportSection('consumption')">📥 Export</button>
        </div>
      </div>
      <div id="consumptionContent"></div>
    </div>

    <!-- Dispense Log section -->
    <div id="section-dispense" class="card report-section hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
        <h2 style="font-size:1.1rem;font-weight:700;margin:0;">💊 Recent Dispense Records</h2>
        <button class="btn btn-secondary btn-sm" onclick="exportSection('dispense')">📥 Export</button>
      </div>
      <div id="dispenseContent"></div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
