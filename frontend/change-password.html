<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Pharmacy Logistics System</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">🏥 Ehafo Clinic Pharmacy</div>
      <div class="user-menu">
        <span class="user-info" id="userEmail"></span>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Log Out</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Change Password</h1>
      <a href="dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Update Your Password</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">
          For security reasons, please change your password from the default one assigned to you.
        </p>
      </div>

      <form id="changePasswordForm">
        <div class="form-group">
          <label for="currentPassword" class="form-label">Current Password *</label>
          <input type="password" id="currentPassword" class="form-input" required placeholder="Enter your current password">
          <div class="form-error hidden" id="currentPasswordError"></div>
        </div>

        <div class="form-group">
          <label for="newPassword" class="form-label">New Password *</label>
          <input type="password" id="newPassword" class="form-input" required minlength="6" placeholder="Enter your new password (min. 6 characters)">
          <small style="color: var(--text-secondary); font-size: 0.75rem;">
            Password must be at least 6 characters long
          </small>
          <div class="form-error hidden" id="newPasswordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm New Password *</label>
          <input type="password" id="confirmPassword" class="form-input" required minlength="6" placeholder="Confirm your new password">
          <div class="form-error hidden" id="confirmPasswordError"></div>
        </div>

        <div id="messageContainer"></div>

        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary">Change Password</button>
          <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // Show message
    function showMessage(message, type = 'info') {
      const container = document.getElementById('messageContainer');
      container.innerHTML = `<div class="message message-${type}">${message}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    // Show error
    function showError(fieldId, message) {
      const errorEl = document.getElementById(fieldId + 'Error');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      }
    }

    // Clear errors
    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.classList.add('hidden');
        el.textContent = '';
      });
    }

    // Form submission
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (!currentPassword) {
        showError('currentPassword', 'Please enter your current password');
        return;
      }

      if (!newPassword || newPassword.length < 6) {
        showError('newPassword', 'New password must be at least 6 characters long');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('confirmPassword', 'New passwords do not match');
        return;
      }

      if (currentPassword === newPassword) {
        showError('newPassword', 'New password must be different from current password');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Changing Password...';

      try {
        const result = await changePassword(currentPassword, newPassword);
        
        if (result.success) {
          showMessage(result.message || 'Password changed successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 2000);
        } else {
          showMessage('Error: ' + result.error, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Change Password';
        }
      } catch (error) {
        console.error('Error changing password:', error);
        showMessage('Error: ' + (error.message || 'Failed to change password. Please try again.'), 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Change Password';
      }
    });

    // Initialize page
    async function initPage() {
      // Wait for auth state to be determined
      const user = await new Promise((resolve) => {
        if (auth && auth.currentUser) {
          resolve(auth.currentUser);
        } else {
          auth.onAuthStateChanged((user) => {
            resolve(user);
          });
        }
      });
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('userEmail').textContent = user.email;
    }

    initPage();
  </script>
</body>
</html>
