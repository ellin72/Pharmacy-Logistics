<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Medicines - Pharmacy Logistics System</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">🏥 Ehafo Clinic Pharmacy</div>
      <div class="user-menu">
        <span class="user-info" id="userEmail"></span>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Log Out</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Seed Medicines Database</h1>
      <a href="dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Add Medicine Templates</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">
          This will add all medicines from your inventory list to the database with 0 quantity.
          These will serve as templates, making it easier to add stock later.
        </p>
      </div>

      <div id="statusContainer" style="margin-bottom: 1.5rem;"></div>

      <div class="flex gap-2">
        <button id="seedBtn" class="btn btn-primary" onclick="seedMedicines()">Seed Medicines</button>
        <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
      </div>

      <div id="progressContainer" style="margin-top: 1.5rem; display: none;">
        <div style="background: var(--bg-secondary); padding: 1rem; border-radius: 0.375rem;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span>Progress:</span>
            <span id="progressText">0 / 0</span>
          </div>
          <div style="background: var(--bg-primary); height: 20px; border-radius: 0.25rem; overflow: hidden;">
            <div id="progressBar" style="background: var(--primary-color); height: 100%; width: 0%; transition: width 0.3s;"></div>
          </div>
        </div>
        <div id="resultsContainer" style="margin-top: 1rem; max-height: 400px; overflow-y: auto;"></div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/inventory.js"></script>
  
  <script>
    // Medicine list from medicine.md
    const medicineNames = [

      "Lamivudine 60 mg + Abacavir 120 mg Tabs (3TC+ABC)",

      "Lopinavir 40 mg + Ritonavir 10 mg Granules (LPV)",
      "Tenofovir 300 mg + Emtricitabine 200 mg Tabs (TDF+FTC)",

      "Dolutegravir 50 mg + Lamivudine 300 mg + Tenofovir 300 mg Tabs (TLD)",

      "Efavirenz 600 mg Tabs",
      "Efavirenz 50 mg Caps",
      "Lamivudine 150 mg + Stavudine 30 mg Tabs",
      "Lamivudine 150 mg Tabs",
      "Abacavir 600 mg + Lamivudine 300 mg Tabs (ABC/3TC)",
      "Lamivudine 30 mg + Abacavir 60 mg Tabs",
      "Lopinavir 100 mg + Ritonavir 25 mg Tabs",
      "Zidovudine 300 mg Tabs (AZT)",

      "Ritonavir 100 mg Caps (RTV)",

      "Enalapril 10 mg Tabs",
      "Enalapril 20 mg Tabs",
      "Glyceryl Trinitrate 0.5 mg Tabs (Sublingual)",
      "Nifedipine 5 mg Caps",

      "Amoxicillin 250 mg Caps",

      "Ciprofloxacin 500 mg Tabs",
      "Co-Trimoxazole 80+400 mg Tabs",
      "Doxycycline 100 mg Tabs",
      "Erythromycin 250 mg Tabs",
      "Penicillin V 250 mg Tabs",
      "Amoxicillin 875 mg + Clavulanic Acid 125 mg Tabs (Amoxyclav)",
      "Cefuroxime 500 mg Tabs",
      "Amoxicillin Suspension 125 mg/5ml"
    ];

    let results = {
      created: [],
      skipped: [],
      errors: []
    };

    function showStatus(message, type = 'info') {
      const container = document.getElementById('statusContainer');
      const className = type === 'error' ? 'message message-error' : 
                       type === 'success' ? 'message message-success' : 
                       'message message-info';
      container.innerHTML = `<div class="${className}">${message}</div>`;
    }

    function updateProgress(current, total) {
      const progressText = document.getElementById('progressText');
      const progressBar = document.getElementById('progressBar');
      const percentage = total > 0 ? (current / total) * 100 : 0;
      
      progressText.textContent = `${current} / ${total}`;
      progressBar.style.width = `${percentage}%`;
    }

    function addResult(medicineName, status, message) {
      const container = document.getElementById('resultsContainer');
      const div = document.createElement('div');
      div.style.padding = '0.5rem';
      div.style.marginBottom = '0.25rem';
      div.style.borderRadius = '0.25rem';
      div.style.fontSize = '0.875rem';
      
      if (status === 'created') {
        div.style.background = 'rgba(34, 197, 94, 0.1)';
        div.style.color = 'var(--success-color)';
        div.textContent = `✓ ${medicineName}`;
        results.created.push(medicineName);
      } else if (status === 'skipped') {
        div.style.background = 'rgba(251, 191, 36, 0.1)';
        div.style.color = 'var(--warning-color)';
        div.textContent = `⊘ ${medicineName} - ${message}`;
        results.skipped.push({ name: medicineName, reason: message });
      } else {
        div.style.background = 'rgba(239, 68, 68, 0.1)';
        div.style.color = 'var(--danger-color)';
        div.textContent = `✗ ${medicineName} - ${message}`;
        results.errors.push({ name: medicineName, error: message });
      }
      
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function seedMedicines() {
      const user = getCurrentUser();
      if (!user) {
        showStatus('You must be logged in to seed medicines', 'error');
        return;
      }

      const seedBtn = document.getElementById('seedBtn');
      seedBtn.disabled = true;
      seedBtn.textContent = 'Seeding...';

      document.getElementById('progressContainer').style.display = 'block';
      document.getElementById('resultsContainer').innerHTML = '';
      
      results = { created: [], skipped: [], errors: [] };

      // Set a default expiry date (1 year from now) and default batch
      const defaultExpiryDate = new Date();
      defaultExpiryDate.setFullYear(defaultExpiryDate.getFullYear() + 1);
      const defaultBatch = 'TEMPLATE-' + new Date().getFullYear();

      let processed = 0;
      const total = medicineNames.length;

      showStatus(`Starting to seed ${total} medicines...`, 'info');

      for (const medicineName of medicineNames) {
        try {
          // Check if medicine already exists (by name only, not batch)
          const allMedicines = await getAllMedicines();
          const exists = allMedicines.some(m => 
            m.name.trim().toLowerCase() === medicineName.trim().toLowerCase()
          );

          if (exists) {
            addResult(medicineName, 'skipped', 'Already exists');
          } else {
            // Create medicine with 0 quantity as template
            const medicineData = {
              name: medicineName.trim(),
              batch: defaultBatch,
              expiryDate: defaultExpiryDate.toISOString().split('T')[0],
              quantity: 0,
              minThreshold: 10, // Default threshold
              notes: 'Medicine template - add stock to activate'
            };

            const result = await addMedicine(medicineData);
            
            if (result.success) {
              addResult(medicineName, 'created', '');
            } else {
              addResult(medicineName, 'error', result.error || 'Failed to create');
            }
          }
        } catch (error) {
          console.error(`Error processing ${medicineName}:`, error);
          addResult(medicineName, 'error', error.message || 'Unknown error');
        }

        processed++;
        updateProgress(processed, total);

        // Small delay to avoid overwhelming the database
        await new Promise(resolve => setTimeout(resolve, 100));
      }

      // Show summary
      const summary = `
        <strong>Seeding Complete!</strong><br>
        Created: ${results.created.length}<br>
        Skipped (already exist): ${results.skipped.length}<br>
        Errors: ${results.errors.length}
      `;
      showStatus(summary, results.errors.length > 0 ? 'error' : 'success');

      seedBtn.disabled = false;
      seedBtn.textContent = 'Seed Medicines';
    }

    // Initialize page
    async function initPage() {
      // Wait for auth state to be determined
      const user = await new Promise((resolve) => {
        if (auth && auth.currentUser) {
          resolve(auth.currentUser);
        } else {
          auth.onAuthStateChanged((user) => {
            resolve(user);
          });
        }
      });
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      // Check if user is admin
      const userRole = await getUserRole();
      if (userRole !== 'admin') {
        showStatus('Access Denied: This page is only available to administrators.', 'error');
        document.getElementById('seedBtn').disabled = true;
        document.getElementById('seedBtn').textContent = 'Admin Only';
        document.getElementById('seedBtn').style.opacity = '0.5';
        document.getElementById('seedBtn').style.cursor = 'not-allowed';
        
        // Redirect to dashboard after 3 seconds
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 3000);
        return;
      }

      const roleBadge = userRole === 'admin' ? '👑 Admin' : '👤 Staff';
      document.getElementById('userEmail').textContent = `${user.email} (${roleBadge})`;
      showStatus(`Ready to seed ${medicineNames.length} medicines. Click the button to start.`, 'info');
    }

    initPage();
  </script>
</body>
</html>
