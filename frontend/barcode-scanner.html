<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner - Pharmacy Logistics System</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .scanner-container {
      max-width: 600px;
      margin: 0 auto;
    }
    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 0.5rem;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    #scannerVideo {
      width: 100%;
      height: auto;
      display: block;
    }
    .scanner-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 200px;
      border: 2px solid #fff;
      border-radius: 0.5rem;
      pointer-events: none;
    }
    .scanner-controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .scan-result {
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 0.375rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">🏥 Ehafo Clinic Pharmacy</div>
      <div class="user-menu">
        <span class="user-info" id="userEmail"></span>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Log Out</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="dashboard-header">
      <h1 class="dashboard-title">📷 Barcode Scanner</h1>
      <a href="dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <div class="scanner-container">
      <div class="card">
        <h2 class="card-title">Scan Barcode/QR Code</h2>
        
        <div id="scannerNotSupported" style="display: none;">
          <div class="empty-state">
            <p>Camera not supported on this device.</p>
          </div>
        </div>

        <div id="scannerSection" style="display: none;">
          <div class="video-container">
            <video id="scannerVideo" autoplay playsinline></video>
            <canvas id="scannerCanvas" style="display: none;"></canvas>
            <div class="scanner-overlay"></div>
          </div>

          <div class="form-group" style="margin-bottom: 1rem;">
            <label class="form-label">Scan Mode</label>
            <select id="scanMode" class="form-select" onchange="switchScanMode()">
              <option value="qr">QR Code</option>
              <option value="barcode">Barcode</option>
              <option value="both">Both (Auto-detect)</option>
            </select>
          </div>

          <div class="scanner-controls">
            <button id="startScanBtn" onclick="startScanning()" class="btn btn-primary">Start Scanning</button>
            <button id="stopScanBtn" onclick="stopScanning()" class="btn btn-secondary" style="display: none;">Stop Scanning</button>
          </div>

          <div id="scanResult" class="scan-result" style="display: none;">
            <h3>Scan Result:</h3>
            <div id="scanResultContent"></div>
            <div id="scanActions" style="margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
              <button onclick="showMedicineActions()" class="btn btn-primary">⚡ Actions</button>
              <button onclick="handleScanResult()" class="btn btn-secondary">📊 View Details</button>
            </div>
          </div>
        </div>

        <div style="margin-top: 2rem;">
          <h3 style="margin-bottom: 1rem;">Or Upload Image</h3>
          <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)" class="form-input">
        </div>
      </div>

      <!-- Generate QR Code Section -->
      <div class="card" style="margin-top: 1.5rem;">
        <h2 class="card-title">Generate QR Code</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">
          Generate QR code for a medicine to enable quick scanning.
        </p>

        <div class="form-group">
          <label class="form-label">Select Medicine</label>
          <select id="medicineSelect" class="form-select">
            <option value="">Select a medicine...</option>
          </select>
        </div>

        <div id="qrCodeDisplay" style="display: none; text-align: center; margin-top: 1.5rem;">
          <img id="qrCodeImage" src="" alt="QR Code" style="max-width: 200px; border: 1px solid var(--border-color); border-radius: 0.375rem;">
          <p style="margin-top: 1rem; font-size: 0.875rem; color: var(--text-secondary);" id="qrCodeInfo"></p>
          <button onclick="downloadQRCode()" class="btn btn-secondary" style="margin-top: 1rem;">Download QR Code</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- Barcode/QR Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  
  <script>
    // Verify libraries loaded
    window.addEventListener('load', () => {
      if (typeof jsQR === 'undefined') {
        console.error('jsQR library failed to load');
      } else {
        console.log('jsQR library loaded successfully');
      }
      
      if (typeof ZXing === 'undefined') {
        console.error('ZXing library failed to load');
      } else {
        console.log('ZXing library loaded successfully');
      }
    });
  </script>
  
  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/barcode.js"></script>
  <script src="js/users.js"></script>
  
  <script>
    let currentStream = null;
    let scannedData = null;
    let allMedicines = [];
    let scanner = null;
    let qrScanner = null;
    let barcodeScanner = null;
    let currentScanMode = 'qr';

    // Check camera support
    function checkCameraSupport() {
      if (!hasCamera()) {
        document.getElementById('scannerNotSupported').style.display = 'block';
        return false;
      }
      document.getElementById('scannerSection').style.display = 'block';
      return true;
    }

    // Switch scan mode
    function switchScanMode() {
      const mode = document.getElementById('scanMode').value;
      currentScanMode = mode;
      
      // Stop current scanner if running
      if (scanner) {
        scanner.stop();
        scanner = null;
      }
    }

    // Start scanning
    async function startScanning() {
      // Ensure medicines are loaded
      if (allMedicines.length === 0) {
        await loadMedicines();
      }
      
      const video = document.getElementById('scannerVideo');
      const canvas = document.getElementById('scannerCanvas');
      
      const mode = document.getElementById('scanMode').value;
      currentScanMode = mode;

      // Reset scan processing
      window.scanProcessing = false;

      try {
        // Initialize appropriate scanner
        if (mode === 'qr' || mode === 'both') {
          qrScanner = setupQRScanner(video, canvas, handleScan);
          if (!qrScanner) {
            showMessage('QR scanner not available. Check if jsQR library is loaded.', 'error');
          }
        }
        if (mode === 'barcode' || mode === 'both') {
          barcodeScanner = setupBarcodeScanner(video, canvas, handleScan);
          if (!barcodeScanner) {
            showMessage('Barcode scanner not available. Check if ZXing library is loaded.', 'error');
          }
        }

        // Start the appropriate scanner
        let result;
        if (mode === 'qr') {
          if (!qrScanner) {
            showMessage('QR scanner failed to initialize', 'error');
            return;
          }
          scanner = qrScanner;
          result = await qrScanner.start();
        } else if (mode === 'barcode') {
          if (!barcodeScanner) {
            showMessage('Barcode scanner failed to initialize', 'error');
            return;
          }
          scanner = barcodeScanner;
          result = await barcodeScanner.start();
        } else {
          // Try both
          let qrStarted = false;
          if (qrScanner) {
            const qrResult = await qrScanner.start();
            qrStarted = qrResult && qrResult.success;
          }
          if (barcodeScanner) {
            result = await barcodeScanner.start();
            if (result && result.success) {
              scanner = barcodeScanner; // Primary scanner
            }
          }
          if (!qrStarted && (!result || !result.success)) {
            showMessage('Failed to start scanners', 'error');
            return;
          }
        }

        if (result && result.success) {
          document.getElementById('startScanBtn').style.display = 'none';
          document.getElementById('stopScanBtn').style.display = 'inline-block';
          showMessage('Scanner started. Point camera at QR code or barcode.', 'success');
        } else if (result && !result.success) {
          showMessage('Error: ' + result.error, 'error');
          console.error('Scanner error:', result.error);
        } else {
          // QR scanner started without result object (normal for QR)
          document.getElementById('startScanBtn').style.display = 'none';
          document.getElementById('stopScanBtn').style.display = 'inline-block';
          showMessage('Scanner started. Point camera at QR code or barcode.', 'success');
        }
      } catch (error) {
        showMessage('Error starting scanner: ' + error.message, 'error');
        console.error('Scanner error:', error);
      }
    }

    // Stop scanning
    function stopScanning() {
      console.log('Stopping scanners...');
      
      if (scanner) {
        try {
          scanner.stop();
        } catch (e) {
          console.error('Error stopping scanner:', e);
        }
        scanner = null;
      }
      
      if (qrScanner) {
        try {
          qrScanner.stop();
        } catch (e) {
          console.error('Error stopping QR scanner:', e);
        }
        qrScanner = null;
      }
      
      if (barcodeScanner) {
        try {
          barcodeScanner.stop();
        } catch (e) {
          console.error('Error stopping barcode scanner:', e);
        }
        barcodeScanner = null;
      }

      if (currentStream) {
        try {
          stopBarcodeScanner(currentStream);
        } catch (e) {
          console.error('Error stopping stream:', e);
        }
        currentStream = null;
      }
      
      const video = document.getElementById('scannerVideo');
      if (video && video.srcObject) {
        video.srcObject = null;
      }
      
      document.getElementById('startScanBtn').style.display = 'inline-block';
      document.getElementById('stopScanBtn').style.display = 'none';
      
      // Don't hide scan result, let user see it
      // document.getElementById('scanResult').style.display = 'none';
    }

    // Handle scan result
    function handleScan(data) {
      console.log('handleScan called with:', data);
      
      // Prevent multiple rapid calls
      if (window.scanProcessing) {
        console.log('Scan already processing, ignoring...');
        return;
      }
      window.scanProcessing = true;
      
      // Stop scanning on successful scan
      stopScanning();
      
      // Handle different data formats
      let parsedData;
      if (typeof data === 'string') {
        // Try to parse as JSON first
        try {
          parsedData = JSON.parse(data);
          console.log('Parsed as JSON:', parsedData);
        } catch (e) {
          // Not JSON, might be barcode or medicine ID
          console.log('Not JSON, treating as text:', data);
          
          // Check if it's a medicine ID (Firestore ID format)
          if (data.length === 20 && /^[a-zA-Z0-9]+$/.test(data)) {
            // Could be a medicine ID
            const medicine = allMedicines.find(m => m.id === data);
            if (medicine) {
              parsedData = { 
                id: medicine.id, 
                name: medicine.name, 
                batch: medicine.batch, 
                type: 'medicine' 
              };
            } else {
              parsedData = { type: 'barcode', code: data };
            }
          } else {
            // Try to find by batch number
            const medicine = allMedicines.find(m => m.batch === data);
            if (medicine) {
              parsedData = { 
                id: medicine.id, 
                name: medicine.name, 
                batch: medicine.batch, 
                type: 'medicine' 
              };
            } else {
              parsedData = { type: 'barcode', code: data };
            }
          }
        }
      } else if (data && typeof data === 'object') {
        parsedData = data;
      } else {
        console.warn('Unexpected data format:', data);
        parsedData = { type: 'unknown', raw: data };
      }

      scannedData = parsedData;
      console.log('Final scanned data:', scannedData);
      
      // Display result
      if (scannedData && scannedData.type === 'medicine' && scannedData.id) {
        // Find medicine in inventory to get full details
        const medicine = allMedicines.find(m => m.id === scannedData.id);
        
        if (medicine) {
          // Medicine found - show detailed info with actions
          document.getElementById('scanResultContent').innerHTML = `
            <div style="background: var(--bg-secondary); padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;">
              <p style="font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem;">${escapeHtml(medicine.name)}</p>
              <p><strong>Batch:</strong> ${escapeHtml(medicine.batch)}</p>
              <p><strong>Current Stock:</strong> <span style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">${medicine.quantity}</span> units</p>
              <p><strong>Min Threshold:</strong> ${medicine.minThreshold}</p>
              <p><strong>Expiry Date:</strong> ${medicine.expiryDate ? new Date(medicine.expiryDate).toLocaleDateString() : 'N/A'}</p>
              <p><strong>Status:</strong> <span class="badge badge-${medicine.status === 'in_stock' ? 'success' : medicine.status === 'low_stock' ? 'low-stock' : medicine.status === 'expired' ? 'expired' : 'expiring-soon'}">${medicine.status}</span></p>
            </div>
          `;
          document.getElementById('scanResult').style.display = 'block';
          document.getElementById('scanActions').style.display = 'flex';
          showMessage('✅ Scan successful! Medicine found. Click Actions to manage.', 'success');
          
          // Auto-show action modal after 1 second
          setTimeout(() => {
            showMedicineActions();
          }, 1000);
        } else {
          // Medicine ID found but not in current inventory
          document.getElementById('scanResultContent').innerHTML = `
            <p><strong>Medicine ID:</strong> ${scannedData.id}</p>
            <p><strong>Name:</strong> ${escapeHtml(scannedData.name || 'Unknown')}</p>
            <p style="color: var(--warning-color);">⚠️ Medicine not found in current inventory.</p>
          `;
          document.getElementById('scanResult').style.display = 'block';
          showMessage('⚠️ Medicine ID found but not in inventory', 'warning');
        }
        
        window.scanProcessing = false;
      } else if (scannedData && scannedData.type === 'barcode') {
        // Try to find medicine by batch number or code
        const medicine = allMedicines.find(m => 
          m.batch === scannedData.code || 
          m.id === scannedData.code ||
          m.name.toLowerCase().includes(scannedData.code.toLowerCase())
        );
        
        if (medicine) {
          scannedData = { 
            id: medicine.id, 
            name: medicine.name, 
            batch: medicine.batch, 
            type: 'medicine' 
          };
          // Show detailed medicine info
          document.getElementById('scanResultContent').innerHTML = `
            <div style="background: var(--bg-secondary); padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;">
              <p style="font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem;">${escapeHtml(medicine.name)}</p>
              <p><strong>Batch:</strong> ${escapeHtml(medicine.batch)}</p>
              <p><strong>Current Stock:</strong> <span style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">${medicine.quantity}</span> units</p>
              <p><strong>Min Threshold:</strong> ${medicine.minThreshold}</p>
              <p><strong>Expiry Date:</strong> ${medicine.expiryDate ? new Date(medicine.expiryDate).toLocaleDateString() : 'N/A'}</p>
              <p><strong>Status:</strong> <span class="badge badge-${medicine.status === 'in_stock' ? 'success' : medicine.status === 'low_stock' ? 'low-stock' : medicine.status === 'expired' ? 'expired' : 'expiring-soon'}">${medicine.status}</span></p>
            </div>
          `;
          document.getElementById('scanResult').style.display = 'block';
          document.getElementById('scanActions').style.display = 'flex';
          showMessage('✅ Scan successful! Medicine found. Click Actions to manage.', 'success');
          window.scanProcessing = false;
        } else {
          window.scanProcessing = false;
          showMessage('⚠️ Barcode not found in inventory. Code: ' + scannedData.code, 'warning');
          
          // Show what was scanned
          document.getElementById('scanResultContent').innerHTML = `
            <p><strong>Scanned Code:</strong> ${escapeHtml(scannedData.code)}</p>
            <p style="color: var(--text-secondary); font-size: 0.875rem;">
              This code was not found in the inventory. Make sure the medicine exists in the system.
            </p>
          `;
          document.getElementById('scanResult').style.display = 'block';
        }
      } else {
        window.scanProcessing = false;
        showMessage('❌ Invalid QR code or barcode format. Scanned: ' + (typeof data === 'string' ? data : JSON.stringify(data)), 'error');
        console.error('Invalid scan data:', data);
      }
    }

    // Handle scan result button - navigate to dashboard
    function handleScanResult() {
      if (scannedData && scannedData.id) {
        window.location.href = `dashboard.html?highlight=${scannedData.id}`;
      }
    }

    // Show medicine actions modal
    async function showMedicineActions() {
      if (!scannedData || !scannedData.id) {
        showMessage('No medicine selected. Please scan a medicine first.', 'error');
        return;
      }

      // Get full medicine details
      const medicine = allMedicines.find(m => m.id === scannedData.id);
      if (!medicine) {
        showMessage('Medicine not found. Please try scanning again.', 'error');
        return;
      }

      // Show action modal
      showActionModal(medicine);
    }

    // Show action modal for medicine
    function showActionModal(medicine) {
      const userRole = window.currentUserRole || 'staff';
      const isAdmin = userRole === 'admin';

      const modal = document.createElement('div');
      modal.id = 'medicineActionModal';
      modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        animation: fadeIn 0.2s ease-out;
      `;

      modal.innerHTML = `
        <div style="
          background: white;
          border-radius: 0.5rem;
          padding: 2rem;
          max-width: 500px;
          width: 100%;
          max-height: 90vh;
          overflow-y: auto;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        ">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="margin: 0;">Medicine Actions</h2>
            <button onclick="closeActionModal()" style="
              background: transparent;
              border: none;
              font-size: 1.5rem;
              cursor: pointer;
              color: var(--text-secondary);
            ">×</button>
          </div>

          <!-- Medicine Info -->
          <div style="background: var(--bg-secondary); padding: 1rem; border-radius: 0.375rem; margin-bottom: 1.5rem;">
            <h3 style="margin: 0 0 0.5rem 0;">${escapeHtml(medicine.name)}</h3>
            <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>Batch:</strong> ${escapeHtml(medicine.batch)}</p>
            <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>Current Stock:</strong> <span style="font-size: 1.25rem; font-weight: bold; color: var(--primary-color);">${medicine.quantity}</span></p>
            <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>Min Threshold:</strong> ${medicine.minThreshold}</p>
            <p style="margin: 0.25rem 0; color: var(--text-secondary);"><strong>Expiry Date:</strong> ${medicine.expiryDate ? new Date(medicine.expiryDate).toLocaleDateString() : 'N/A'}</p>
            <p style="margin: 0.25rem 0;"><strong>Status:</strong> <span class="badge badge-${medicine.status === 'in_stock' ? 'success' : medicine.status === 'low_stock' ? 'low-stock' : medicine.status === 'expired' ? 'expired' : 'expiring-soon'}">${medicine.status}</span></p>
          </div>

          <!-- Quick Actions -->
          <div style="display: grid; gap: 0.75rem;">
            <button onclick="quickAddStock('${medicine.id}')" class="btn btn-success" style="width: 100%;">
              ➕ Add Stock
            </button>
            <button onclick="quickRemoveStock('${medicine.id}')" class="btn btn-secondary" style="width: 100%;">
              ➖ Remove Stock
            </button>
            <button onclick="quickAdjustStock('${medicine.id}')" class="btn btn-primary" style="width: 100%;">
              🔄 Adjust Stock
            </button>
            <a href="adjust-stock.html?medicineId=${medicine.id}" class="btn btn-secondary" style="width: 100%; text-align: center; text-decoration: none; display: block;">
              📝 Full Stock Adjustment
            </a>
            ${isAdmin ? `
            <button onclick="quickDeleteMedicine('${medicine.id}', '${escapeHtml(medicine.name)}')" class="btn" style="width: 100%; background: var(--danger-color); color: white;">
              🗑️ Delete Medicine
            </button>
            ` : ''}
            <button onclick="viewMedicineDetails('${medicine.id}')" class="btn btn-secondary" style="width: 100%;">
              📊 View Full Details
            </button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);

      // Add fade-in animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
      `;
      if (!document.getElementById('modalStyles')) {
        style.id = 'modalStyles';
        document.head.appendChild(style);
      }
    }

    // Close action modal
    window.closeActionModal = function() {
      const modal = document.getElementById('medicineActionModal');
      if (modal) {
        modal.remove();
      }
    };

    // Quick add stock
    async function quickAddStock(medicineId) {
      closeActionModal();
      
      const quantity = prompt('Enter quantity to add:');
      if (!quantity || isNaN(quantity) || parseInt(quantity) <= 0) {
        return;
      }

      const reason = prompt('Reason (optional):') || 'Stock added via scanner';

      const result = await updateStock(medicineId, 'add', parseInt(quantity), reason);
      
      if (result.success) {
        showMessage(`✅ Added ${quantity} units. New stock: ${result.newQuantity}`, 'success');
        // Reload medicines to get updated data
        await loadMedicines();
        // Update scan result display
        updateScanResultDisplay();
        // Re-open action modal with updated data
        setTimeout(() => showMedicineActions(), 500);
      } else {
        showMessage('❌ Error: ' + result.error, 'error');
      }
    }

    // Quick remove stock
    async function quickRemoveStock(medicineId) {
      closeActionModal();
      
      const quantity = prompt('Enter quantity to remove:');
      if (!quantity || isNaN(quantity) || parseInt(quantity) <= 0) {
        return;
      }

      const reason = prompt('Reason (optional):') || 'Stock removed via scanner';

      const result = await updateStock(medicineId, 'remove', parseInt(quantity), reason);
      
      if (result.success) {
        showMessage(`✅ Removed ${quantity} units. New stock: ${result.newQuantity}`, 'success');
        await loadMedicines();
        updateScanResultDisplay();
        setTimeout(() => showMedicineActions(), 500);
      } else {
        showMessage('❌ Error: ' + result.error, 'error');
      }
    }

    // Quick adjust stock
    async function quickAdjustStock(medicineId) {
      closeActionModal();
      
      const medicine = allMedicines.find(m => m.id === medicineId);
      const currentStock = medicine ? medicine.quantity : 0;
      
      const quantity = prompt(`Enter new stock quantity (current: ${currentStock}):`);
      if (!quantity || isNaN(quantity) || parseInt(quantity) < 0) {
        return;
      }

      const reason = prompt('Reason (optional):') || 'Stock adjusted via scanner';

      const result = await updateStock(medicineId, 'adjust', parseInt(quantity), reason);
      
      if (result.success) {
        showMessage(`✅ Stock adjusted to ${result.newQuantity}`, 'success');
        await loadMedicines();
        updateScanResultDisplay();
        setTimeout(() => showMedicineActions(), 500);
      } else {
        showMessage('❌ Error: ' + result.error, 'error');
      }
    }

    // Quick delete medicine (admin only)
    async function quickDeleteMedicine(medicineId, medicineName) {
      const confirmDelete = confirm(`Are you sure you want to delete "${medicineName}"?\n\nThis action cannot be undone.`);
      
      if (!confirmDelete) {
        return;
      }

      const result = await deleteMedicine(medicineId);
      
      if (result.success) {
        showMessage('✅ Medicine deleted successfully', 'success');
        closeActionModal();
        // Clear scanned data
        scannedData = null;
        document.getElementById('scanResult').style.display = 'none';
        await loadMedicines();
      } else {
        showMessage('❌ Error: ' + result.error, 'error');
      }
    }

    // View medicine details
    function viewMedicineDetails(medicineId) {
      window.location.href = `dashboard.html?highlight=${medicineId}`;
    }

    // Update scan result display with latest medicine data
    function updateScanResultDisplay() {
      if (!scannedData || !scannedData.id) return;
      
      const medicine = allMedicines.find(m => m.id === scannedData.id);
      if (medicine) {
        document.getElementById('scanResultContent').innerHTML = `
          <div style="background: var(--bg-secondary); padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;">
            <p style="font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem;">${escapeHtml(medicine.name)}</p>
            <p><strong>Batch:</strong> ${escapeHtml(medicine.batch)}</p>
            <p><strong>Current Stock:</strong> <span style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">${medicine.quantity}</span> units</p>
            <p><strong>Min Threshold:</strong> ${medicine.minThreshold}</p>
            <p><strong>Expiry Date:</strong> ${medicine.expiryDate ? new Date(medicine.expiryDate).toLocaleDateString() : 'N/A'}</p>
            <p><strong>Status:</strong> <span class="badge badge-${medicine.status === 'in_stock' ? 'success' : medicine.status === 'low_stock' ? 'low-stock' : medicine.status === 'expired' ? 'expired' : 'expiring-soon'}">${medicine.status}</span></p>
          </div>
        `;
      }
    }

    // Handle image upload
    async function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const result = await scanQRFromImage(file);
        if (result.success) {
          handleScan(result.data);
        } else {
          showMessage(result.error || 'Could not read QR code from image', 'error');
        }
      } catch (error) {
        showMessage('Error scanning image: ' + error.message, 'error');
      }
    }

    // Load medicines for QR generation
    async function loadMedicines() {
      allMedicines = await getAllMedicines();
      const select = document.getElementById('medicineSelect');
      
      select.innerHTML = '<option value="">Select a medicine...</option>' +
        allMedicines.map(med => `
          <option value="${med.id}">${escapeHtml(med.name)} - ${escapeHtml(med.batch)}</option>
        `).join('');

      select.addEventListener('change', (e) => {
        const medicineId = e.target.value;
        if (medicineId) {
          generateQRForMedicine(medicineId);
        } else {
          document.getElementById('qrCodeDisplay').style.display = 'none';
        }
      });
    }

    // Generate QR code for medicine
    function generateQRForMedicine(medicineId) {
      const medicine = allMedicines.find(m => m.id === medicineId);
      if (!medicine) return;

      const qrData = formatMedicineForQR(medicine);
      const qrCodeUrl = generateQRCode(medicine.id, medicine.name, medicine.batch);
      
      document.getElementById('qrCodeImage').src = qrCodeUrl;
      document.getElementById('qrCodeInfo').textContent = `${medicine.name} - ${medicine.batch}`;
      document.getElementById('qrCodeDisplay').style.display = 'block';
      
      // Store for download
      window.currentQRCode = { url: qrCodeUrl, medicine: medicine };
    }

    // Download QR code
    function downloadQRCode() {
      if (!window.currentQRCode) return;
      
      const link = document.createElement('a');
      link.href = window.currentQRCode.url;
      link.download = `qr-${window.currentQRCode.medicine.name.replace(/\s+/g, '-')}-${window.currentQRCode.medicine.batch}.png`;
      link.click();
    }

    // Show message
    function showMessage(message, type = 'info') {
      const container = document.createElement('div');
      container.className = `message message-${type}`;
      container.textContent = message;
      container.style.position = 'fixed';
      container.style.top = '20px';
      container.style.right = '20px';
      container.style.zIndex = '10000';
      document.body.appendChild(container);
      
      setTimeout(() => container.remove(), 3000);
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize page
    async function initPage() {
      const user = await new Promise((resolve) => {
        if (auth && auth.currentUser) {
          resolve(auth.currentUser);
        } else {
          auth.onAuthStateChanged((user) => {
            resolve(user);
          });
        }
      });
      
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const userRole = await getUserRole();
      const roleBadge = userRole === 'admin' ? '👑 Admin' : '👤 Staff';
      document.getElementById('userEmail').textContent = `${user.email} (${roleBadge})`;

      // Load medicines first
      await loadMedicines();
      console.log('Loaded', allMedicines.length, 'medicines');
      
      checkCameraSupport();
      
      // Reset scan processing flag
      window.scanProcessing = false;
    }

    initPage();
  </script>
</body>
</html>
