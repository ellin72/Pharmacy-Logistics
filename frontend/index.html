<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pharmacy Logistics System</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pharmacy Logistics">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">🏥 Ehafo Clinic</h1>
      <p class="login-subtitle">Pharmacy Logistics System</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-input" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" required autocomplete="current-password">
        </div>
        
        <div id="errorMessage" class="message message-error hidden"></div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">
          Log In
        </button>
        
        <button type="button" id="forgotPasswordBtn" class="btn btn-secondary" style="width: 100%;">
          Forgot Password?
        </button>
      </form>
      
      <div id="resetPasswordSection" class="hidden" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
        <h3 style="margin-bottom: 1rem;">Reset Password</h3>
        <div class="form-group">
          <label for="resetEmail" class="form-label">Enter your email</label>
          <input type="email" id="resetEmail" class="form-input" autocomplete="email">
        </div>
        <button type="button" id="sendResetBtn" class="btn btn-primary" style="width: 100%;">
          Send Reset Link
        </button>
        <button type="button" id="cancelResetBtn" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      
      errorDiv.classList.add('hidden');
      
      const result = await login(email, password);
      if (!result.success) {
        errorDiv.textContent = result.error;
        errorDiv.classList.remove('hidden');
      }
      // Success - auth.js will redirect to dashboard
    });
    
    // Forgot password handler
    document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
      document.getElementById('resetPasswordSection').classList.remove('hidden');
    });
    
    document.getElementById('cancelResetBtn').addEventListener('click', () => {
      document.getElementById('resetPasswordSection').classList.add('hidden');
      document.getElementById('resetEmail').value = '';
    });
    
    document.getElementById('sendResetBtn').addEventListener('click', async () => {
      const email = document.getElementById('resetEmail').value;
      if (!email) {
        alert('Please enter your email address');
        return;
      }
      
      const result = await resetPassword(email);
      if (result.success) {
        alert(result.message);
        document.getElementById('resetPasswordSection').classList.add('hidden');
      } else {
        alert(result.error);
      }
    });
  </script>
</body>
</html>
